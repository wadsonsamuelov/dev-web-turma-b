<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarefas</title>
    <script src="script.js"></script>
    <style>
      body {
        font-family: "Gill Sans";
        background: #e4f9ff;
        padding: 16px;
      }
      h1 {
        color: cadetblue;
        text-align: left;
      }
      .input-area {
        text-align: left;
        margin-bottom: 25px;
      }
      #tarefaInput {
        padding: 8px;
        border-radius: 8px;
        border: cadetblue solid 1px;
      }
      #btnAdicionar {
        padding: 8px 12px;
        color: #f2f2f2;
        background-color: cadetblue;
        border: 0px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.5s;
      }
      #btnAdicionar:hover {
        background-color: rgb(65, 107, 108);
        color: white;
        transition: 0.5s;
      }

      #listaTarefas {
        padding: 0px;
      }

      li {
        background-color: white;
        padding: 10px;
        margin-bottom: 12px;
        border-radius: 8px;
        width: 130px;
        border: cadetblue dotted 2px;
        display: flex;
        justify-content: space-between;
      }

      .fechar {
        background-color: darkred;
        border-radius: 100px;
        border: 0px;
        color: white;
      }

      .concluida {
        text-decoration: line-through;
        color: gray;
      }
    </style>
  </head>
  <body>
    <h1>Tarefas</h1>
    <div class="input-area">
      <input id="tarefaInput" type="text" placeholder="Digite sua Tarefa!" />
      <button id="btnAdicionar">+</button>
    </div>
    <ul id="listaTarefas"></ul>
  </body>
</html>
