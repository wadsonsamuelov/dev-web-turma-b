<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      background-color: #f5f0e8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 16px;
    }

    #app {
      width: 100%;
      max-width: 540px;
    }

    h1 {
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .subtitulo {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 32px;
      letter-spacing: 1px;
    }

    .form-adicionar {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }

    .form-adicionar input {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid #1a1a1a;
      background: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-adicionar input:focus {
      border-color: #e07b39;
    }

    .form-adicionar input::placeholder {
      color: #bbb;
    }

    .form-adicionar button {
      padding: 12px 18px;
      background-color: #1a1a1a;
      color: #f5f0e8;
      border: 2px solid #1a1a1a;
      font-family: inherit;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
    }

    .form-adicionar button:hover {
      background-color: #e07b39;
      border-color: #e07b39;
    }

    .lista-vazia {
      text-align: center;
      padding: 40px 0;
      color: #bbb;
      font-size: 0.85rem;
      letter-spacing: 1px;
      border: 2px dashed #ccc;
    }

    .tarefa {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #fff;
      border: 2px solid #1a1a1a;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }

    .tarefa.concluida {
      opacity: 0.5;
      background: #f0ede7;
    }

    .tarefa input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #e07b39;
      flex-shrink: 0;
    }

    .tarefa .texto {
      flex: 1;
      font-size: 0.95rem;
      color: #1a1a1a;
      word-break: break-word;
    }

    .tarefa.concluida .texto {
      text-decoration: line-through;
      color: #999;
    }

    .tarefa button.remover {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0 4px;
      font-family: inherit;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .tarefa button.remover:hover {
      color: #c0392b;
    }

    .rodape {
      margin-top: 24px;
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>To-Do List</h1>
    <p class="subtitulo">// organize suas tarefas</p>

    <div class="form-adicionar">
      <input
        v-model="novaTarefa"
        type="text"
        placeholder="Nova tarefa..."
        @keyup.enter="adicionarTarefa"
      />
      <button @click="adicionarTarefa">+</button>
    </div>

    <div v-if="tarefas.length === 0" class="lista-vazia">
      nenhuma tarefa por aqui ainda.
    </div>

    <div v-else>
      <div
        v-for="tarefa in tarefas"
        :key="tarefa.id"
        class="tarefa"
        :class="{ concluida: tarefa.concluida }"
      >
        <input
          type="checkbox"
          v-model="tarefa.concluida"
        />
        <span class="texto">{{ tarefa.texto }}</span>
        <button class="remover" @click="removerTarefa(tarefa.id)">✕</button>
      </div>
    </div>

    <div class="rodape" v-if="tarefas.length > 0">
      <span>{{ tarefas.length }} tarefa(s) no total</span>
      <span>{{ tarefasConcluidas }} concluída(s)</span>
    </div>
  </div>

  <script>
    const { createApp, ref, computed } = Vue

    createApp({
      setup() {
        const novaTarefa = ref('')
        const tarefas = ref([])
        let proximoId = 1

        const tarefasConcluidas = computed(() => {
          return tarefas.value.filter(t => t.concluida).length
        })

        function adicionarTarefa() {
          const texto = novaTarefa.value.trim()
          if (!texto) return

          tarefas.value.push({
            id: proximoId++,
            texto: texto,
            concluida: false
          })

          novaTarefa.value = ''
        }

        function removerTarefa(id) {
          tarefas.value = tarefas.value.filter(t => t.id !== id)
        }

        return {
          novaTarefa,
          tarefas,
          tarefasConcluidas,
          adicionarTarefa,
          removerTarefa
        }
      }
    }).mount('#app')
  </script>
</body>
</html>
